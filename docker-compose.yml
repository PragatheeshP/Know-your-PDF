services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build: .

    container_name: rag-app

    ports:
      - "8501:8501"

    depends_on:
      - qdrant

    env_file:
      - .env

volumes:
  qdrant_storage: